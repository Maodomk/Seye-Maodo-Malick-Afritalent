<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AfriTalent</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">AfriTalent</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="freelances.html">Freelances</a></li>
                    <li class="nav-item"><a class="nav-link" href="tarifs.html">Tarifs</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">À propos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
<button id="darkModeBtn" class="btn btn-outline-dark ms-3" aria-label="Changer de thème">
    <i class="bi bi-moon-fill"></i>
</button>
            </div>
        </div>
    </nav>
</header>

<main class="container py-5 mt-5">

    <!-- TITRE -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">Contactez-nous</h1>
        <p>Une question ? Envoyez-nous un message</p>
    </div>

    <div class="row g-4">

        <!-- FORMULAIRE -->
        <div class="col-md-7">

            <form>

                <div class="mb-3">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Prénom</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Sujet</label>
                    <select class="form-select">
                        <option>Support</option>
                        <option>Partenariat</option>
                        <option>Recrutement</option>
                        <option>Autre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" required></textarea>
                </div>

                <button class="btn btn-primary w-100">Envoyer</button>

            </form>

        </div>

        <!-- INFOS -->
        <div class="col-md-5">

            <div class="p-4 bg-light rounded">

                <h5>Informations</h5>

                <p><i class="bi bi-envelope"></i> contact@afritalent.com</p>
                <p><i class="bi bi-telephone"></i> +221 77 000 00 00</p>
                <p><i class="bi bi-geo-alt"></i> Dakar, Sénégal</p>

            </div>

            <div class="mt-4">

                <!-- MAP -->
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18..."
                    width="100%"
                    height="250"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<button id="topBtn" class="btn btn-primary">
    <i class="bi bi-arrow-up"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
